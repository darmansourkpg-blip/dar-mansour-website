name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on ne coupe pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the build can read each article's last-commit date
          # for an accurate JSON-LD dateModified (freshness signal for AI/SEO).
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install markdown PyYAML Pillow

      # Regenerate the site from the Python generator + Journal markdown, so
      # articles published via the CMS (which only commit markdown) become
      # real, SEO-optimised HTML pages before deploy.
      - name: Build site
        run: python3 site/build/build.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # L'étape de publication Pages échoue parfois de façon transitoire.
      # 1re tentative sans faire échouer le job, puis une nouvelle tentative
      # automatique après une courte pause si nécessaire.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retrying deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 10

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      # IndexNow: after a successful deploy, notify Bing/Yandex of the current
      # URLs so they re-crawl within minutes. Non-fatal (never fails the job).
      - name: Ping IndexNow
        if: steps.deployment.outcome == 'success' || steps.deployment_retry.outcome == 'success'
        run: |
          KEY=d560aac2461f36d3a26e14cd4bd4f84f
          URLS=$(grep -oE '<loc>[^<]+</loc>' site/sitemap.xml | sed -E 's#</?loc>##g' | awk '{printf "\"%s\",",$0}' | sed 's/,$//')
          curl -sS -m 30 -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"darmansour.com\",\"key\":\"$KEY\",\"keyLocation\":\"https://darmansour.com/$KEY.txt\",\"urlList\":[$URLS]}" \
            && echo "IndexNow ping sent" || echo "IndexNow ping failed (non-fatal)"
