# Decap CMS — configuration du back-office Dar Mansour
# Le contenu (articles) est enregistré en Markdown dans site/content/journal/
# et les photos dans site/assets/uploads/. Chaque publication déclenche le
# rebuild du site (GitHub Actions) et met l'article en ligne, optimisé SEO.

backend:
  name: github
  repo: darmansourkpg-blip/dar-mansour-website
  branch: main
  # Relais de connexion sécurisé (Cloudflare Worker sveltia-cms-auth).
  base_url: https://dar-mansour-auth.darmansour-kpg.workers.dev

# Où sont stockées les images téléversées depuis l'éditeur
media_folder: "site/assets/uploads"
public_folder: "assets/uploads"

publish_mode: simple
locale: en
site_url: https://darmansour.com
display_url: https://darmansour.com
logo_url: https://darmansour.com/favicon-192.png

collections:
  - name: journal
    label: "Journal — Articles"
    label_singular: "Article"
    description: "Écris, modifie et publie tes articles de blog."
    folder: "site/content/journal"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: [date, title]
    editor:
      preview: true
    fields:
      - label: "Titre de l'article"
        name: "title"
        widget: "string"
        hint: "Le grand titre affiché en haut de l'article (H1)."
      - label: "Date de publication"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
      - label: "Auteur"
        name: "author"
        widget: "string"
        default: "Dar Mansour"
      - label: "Univers éditorial (catégorie)"
        name: "category"
        widget: "select"
        default: "journal"
        hint: "L'univers de l'article — sert au maillage SEO et aux pages de thème."
        options:
          - { label: "Koh Phangan Guide", value: "koh-phangan-guide" }
          - { label: "Culture & Cuisine marocaines", value: "moroccan-culture" }
          - { label: "Journal Dar Mansour (coulisses)", value: "journal" }
      - label: "Photo de couverture"
        name: "cover"
        widget: "image"
        hint: "Grande image en haut de l'article — aussi utilisée lors des partages (WhatsApp, réseaux)."
      - label: "Texte alternatif de la photo (alt)"
        name: "cover_alt"
        widget: "string"
        hint: "Décris la photo en une phrase — important pour Google et l'accessibilité."
      - label: "Titre SEO (Google) — optionnel"
        name: "seo_title"
        widget: "string"
        required: false
        hint: "50–60 caractères. Laisse vide pour réutiliser le titre de l'article."
      - label: "Méta-description (Google)"
        name: "description"
        widget: "text"
        hint: "140–160 caractères. C'est le résumé affiché sous le titre dans les résultats Google."
      - label: "Quick Guide (optionnel)"
        name: "quick_guide"
        widget: "list"
        required: false
        label_singular: "Ligne"
        summary: "{{fields.label}} — {{fields.value}}"
        hint: "Encadré de repères en tête d'article (ex. « Best for » → « Sunsets & couples »)."
        fields:
          - { label: "Intitulé", name: "label", widget: "string", hint: "ex. Best for, Best time, Ideal for" }
          - { label: "Valeur", name: "value", widget: "string" }
      - label: "Contenu de l'article"
        name: "body"
        widget: "markdown"
        hint: "Structure conseillée (playbook) : intro → How We Selected (si classement) → sections H2 → Final thoughts. Montre par des détails concrets au lieu de dire « incroyable ». Ajoute au moins 3 liens internes. Ne jamais inventer prix, horaires, plats. Des gabarits complets sont dans ressources/journal-templates/."
        default: |
          Introduction — 120–200 mots. Réponds tout de suite à la question du lecteur et pose le contexte local. Évite « Koh Phangan is a beautiful tropical island… ».

          ## How We Selected

          This guide is published by Dar Mansour, a Moroccan restaurant in Hin Kong. Our own restaurant is included where it genuinely fits the subject, but the wider selection is based on food quality, character, atmosphere, value and usefulness for the reader.

          <!-- (Supprime cette section si l'article n'est pas un classement.) -->

          ## Première section

          Développe ici. Montre ce qui rend le lieu ou le sujet intéressant, avec des détails concrets. Ajoute un lien interne quand c'est naturel.

          ## Deuxième section

          Développe ici.

          ## Final Thoughts

          Une clôture courte et chaleureuse (100–200 mots) — une observation humaine et, si elle a sa place, une seule invitation discrète.
      - label: "FAQ (optionnel)"
        name: "faq"
        widget: "list"
        required: false
        label_singular: "Question"
        summary: "{{fields.question}}"
        hint: "Questions/réponses affichées en bas de l'article + balisage FAQ Google (résultats enrichis)."
        fields:
          - { label: "Question", name: "question", widget: "string" }
          - { label: "Réponse", name: "answer", widget: "text" }
      - label: "Signature « About the Journal » (optionnel)"
        name: "about"
        widget: "text"
        required: false
        hint: "Laisse vide pour la signature standard ajoutée automatiquement en bas de l'article. Ne remplis que pour la personnaliser."
